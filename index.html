<!DOCTYPE html>
<html>
<head>
  <title>AI Trading Dashboard XAUUSD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0b0f1a;
      color:white;
    }

    .container {
      display:flex;
      flex-direction:column;
      height:100vh;
    }

    #chart {
      height:60vh;
    }

    .panel {
      padding:15px;
      background:#111827;
      flex:1;
    }

    .signal {
      font-size:22px;
      font-weight:bold;
      margin-top:10px;
    }

    .buy { color:#00ff88; }
    .sell { color:#ff4d4d; }
    .neutral { color:#ffd166; }

    .small {
      font-size:12px;
      opacity:0.8;
      margin-top:8px;
      white-space:pre-line;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- CHART -->
  <div id="chart"></div>

  <!-- AI PANEL -->
  <div class="panel">
    <h3>🤖 AI Technical Analyzer (XAUUSD)</h3>

    <div id="signal" class="signal">LOADING AI SIGNAL...</div>
    <div id="desc" class="small"></div>
  </div>

</div>

<!-- TradingView Chart -->
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
  "container_id": "chart",
  "symbol": "OANDA:XAUUSD",
  "interval": "15",
  "theme": "dark",
  "style": "1",
  "locale": "en",
  "autosize": true
});
</script>

<!-- AI ENGINE -->
<script>

async function analyze() {

  try {

    // 📊 ambil data real XAUUSD (Twelve Data - gratis butuh API KEY)
    const API_KEY = "DEMO_KEY_REPLACE";

    const url = `https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=1min&outputsize=50&apikey=${API_KEY}`;

    const res = await fetch(url);
    const json = await res.json();

    if (!json.values) {
      document.getElementById("signal").innerText = "API KEY REQUIRED";
      document.getElementById("desc").innerText =
        "Masukkan API key dari TwelveData untuk data real XAUUSD";
      return;
    }

    let closes = json.values.map(v => parseFloat(v.close)).reverse();

    let last = closes[closes.length - 1];

    // ===== EMA =====
    function EMA(period, arr) {
      let k = 2 / (period + 1);
      let ema = arr[0];

      for (let i = 1; i < arr.length; i++) {
        ema = arr[i] * k + ema * (1 - k);
      }
      return ema;
    }

    let ema20 = EMA(20, closes);
    let ema50 = EMA(50, closes);

    // ===== RSI =====
    function RSI(arr) {
      let gain = 0, loss = 0;

      for (let i = 1; i < arr.length; i++) {
        let diff = arr[i] - arr[i - 1];
        if (diff > 0) gain += diff;
        else loss += Math.abs(diff);
      }

      let rs = gain / (loss || 1);
      return 100 - (100 / (1 + rs));
    }

    let rsi = RSI(closes);

    // ===== MARKET RANGE =====
    let high = Math.max(...closes);
    let low = Math.min(...closes);
    let range = ((high - low) / last) * 100;

    // ===== AI LOGIC =====
    let signal = "";
    let desc = "";
    let cls = "";

    if (ema20 > ema50 && rsi > 55 && range > 0.2) {

      signal = "🟢 BUY BIAS";

      desc =
`Trend: Bullish
Momentum: Strong
Condition: Pullback opportunity

📍 Entry idea:
- Buy on pullback near EMA20

⛔ Invalidasi:
- Below EMA50`;

      cls = "buy";
    }

    else if (ema20 < ema50 && rsi < 45 && range > 0.2) {

      signal = "🔴 SELL BIAS";

      desc =
`Trend: Bearish
Momentum: Strong
Condition: Rejection zone

📍 Entry idea:
- Sell on resistance / EMA pullback

⛔ Invalidasi:
- Above EMA50`;

      cls = "sell";
    }

    else {

      signal = "⚪ NO TRADE";

      desc =
`Market: Sideways / Unclear
Condition: No strong structure

👉 Advice:
- Wait breakout confirmation`;

      cls = "neutral";
    }

    document.getElementById("signal").innerText = signal;
    document.getElementById("signal").className = "signal " + cls;

    document.getElementById("desc").innerText =
`Price: ${last.toFixed(2)}
EMA20: ${ema20.toFixed(2)}
EMA50: ${ema50.toFixed(2)}
RSI: ${rsi.toFixed(2)}
Range: ${range.toFixed(2)}%

----------------------

` + desc;

  } catch (err) {
    document.getElementById("signal").innerText = "ERROR LOADING DATA";
    document.getElementById("desc").innerText = err.message;
  }
}

// 🔥 AUTO RUN
analyze();
setInterval(analyze, 30000);

</script>

</body>
</html>
